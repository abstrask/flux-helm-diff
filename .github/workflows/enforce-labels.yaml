name: Enforce labels

on:
  pull_request:
    types: [labeled, unlabeled, opened, edited, synchronize]
    branches: ["main"]

jobs:
  enforce-label:
    runs-on: ubuntu-latest
    steps:
      - uses: yogevbd/enforce-label-action@a3c219da6b8fa73f6ba62b68ff09c469b3a1c024 # 2.2.2
        with:
          REQUIRED_LABELS_ANY: "release:minor,release:major,release:patch,release:norelease"
          REQUIRED_LABELS_ANY_DESCRIPTION: "Select at least one label ['release:minor','release:major','release:patch','release:norelease']"
