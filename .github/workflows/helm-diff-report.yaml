name: Post Helm diff comment

on:
  workflow_run:
    workflows: ["Test Helm diff (PR)"] # Must match the "name:" of the first workflow exactly
    types:
      - completed

jobs:
  post-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    # Only run if the execution workflow succeeded
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'

    # We grant the write permission needed to post comments here,
    # where no untrusted code is executed.
    permissions:
      pull-requests: write

    steps:
      - name: Download PR diff artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-diff-data
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Read the text files generated by the untrusted workflow
            const prNumber = Number(fs.readFileSync('pr-number.txt', 'utf8').trim());
            const diffMarkdown = fs.readFileSync('diff-results.md', 'utf8');

            if (!prNumber || isNaN(prNumber)) {
              core.setFailed('Invalid PR number found.');
              return;
            }

            // Create a hidden markdown tag to uniquely identify this specific bot comment
            const commentMarker = '';
            const commentBody = `${commentMarker}\n### 🔍 Helm Diff Results\n\n${diffMarkdown}`;

            // Find existing comment by this bot to update it (prevents spamming)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes(commentMarker);
            });

            if (botComment) {
              console.log('Updating existing comment...');
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              console.log('Creating new comment...');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }
